<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Prototype</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="toolbar">
    <h2 class="toolbar-title">Instagram Prototype</h2>
    <div class="view-toggle">
      <button class="toggle-btn active" data-view="desktop">Desktop</button>
      <button class="toggle-btn" data-view="mobile">Mobile</button>
    </div>
  </div>

  <!-- Left Sidebar (desktop only) -->
  <nav class="ig-sidebar">
    <div class="sidebar-top">
      <div class="sidebar-icon sidebar-logo" title="Instagram">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
          <path d="M12 2.2c3.2 0 3.6 0 4.8.1 1.2.1 1.8.2 2.2.4.6.2 1 .5 1.4.9.4.4.7.8.9 1.4.2.4.4 1 .4 2.2.1 1.3.1 1.6.1 4.8s0 3.6-.1 4.8c-.1 1.2-.2 1.8-.4 2.2-.2.6-.5 1-.9 1.4-.4.4-.8.7-1.4.9-.4.2-1 .4-2.2.4-1.3.1-1.6.1-4.8.1s-3.6 0-4.8-.1c-1.2-.1-1.8-.2-2.2-.4-.6-.2-1-.5-1.4-.9-.4-.4-.7-.8-.9-1.4-.2-.4-.4-1-.4-2.2-.1-1.3-.1-1.6-.1-4.8s0-3.6.1-4.8c.1-1.2.2-1.8.4-2.2.2-.6.5-1 .9-1.4.4-.4.8-.7 1.4-.9.4-.2 1-.4 2.2-.4 1.3-.1 1.6-.1 4.8-.1M12 1c-3.3 0-3.7 0-4.9.1C5.8.2 5 .4 4.4.6c-.7.3-1.3.6-1.9 1.2C2 2.4 1.6 3 1.3 3.7c-.3.7-.5 1.4-.5 2.6C.7 7.6.7 8 .7 11.3v1.4c0 3.3 0 3.7.1 4.9.1 1.2.2 2 .5 2.6.3.7.7 1.3 1.2 1.9.6.6 1.2 1 1.9 1.2.7.3 1.4.5 2.6.5 1.3.1 1.7.1 4.9.1s3.7 0 4.9-.1c1.2-.1 2-.2 2.6-.5.7-.3 1.3-.7 1.9-1.2.6-.6 1-1.2 1.2-1.9.3-.7.5-1.4.5-2.6.1-1.3.1-1.7.1-4.9s0-3.7-.1-4.9c-.1-1.2-.2-2-.5-2.6-.3-.7-.7-1.3-1.2-1.9-.6-.6-1.2-1-1.9-1.2C19 .4 18.2.2 17 .1 15.7 0 15.3 0 12 0v1z"/>
          <circle cx="12" cy="12" r="3.2" fill="none" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="18.4" cy="5.6" r="1.1"/>
        </svg>
      </div>
      <div class="sidebar-icon" title="Home">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M9.005 16.545a2.997 2.997 0 0 1 2.997-2.997A2.997 2.997 0 0 1 15 16.545V22H9.005V16.545ZM12 1.5l-8.5 7.273V22H7V16.545a4.997 4.997 0 0 1 9.995 0V22h3.5V8.773L12 1.5Z"/></svg>
      </div>
      <div class="sidebar-icon" title="Search">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
      </div>
      <div class="sidebar-icon" title="Explore">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="16.24,7.76 14.12,14.12 7.76,16.24 9.88,9.88" fill="currentColor" stroke="none"/></svg>
      </div>
      <div class="sidebar-icon" title="Reels">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="3"/><line x1="2" y1="8" x2="22" y2="8"/><line x1="8" y1="2" x2="12" y2="8"/><line x1="14" y1="2" x2="18" y2="8"/><polygon points="10,12 10,19 17,15.5" fill="currentColor" stroke="none"/></svg>
      </div>
      <div class="sidebar-icon" title="Messages">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>
      </div>
      <div class="sidebar-icon" title="Notifications">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </div>
      <div class="sidebar-icon" title="Create">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      </div>
      <div class="sidebar-icon" title="Profile">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M20 21v-2a6 6 0 0 0-6-6H10a6 6 0 0 0-6 6v2"/></svg>
      </div>
    </div>
    <div class="sidebar-bottom">
      <div class="sidebar-icon" title="Threads">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
      </div>
      <div class="sidebar-icon" title="More">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><line x1="3" y1="6" x2="21" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="3" y1="12" x2="21" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="3" y1="18" x2="21" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
    </div>
  </nav>

  <div class="ig-shell" data-view="desktop">

    <header class="profile-header">
      <div class="profile-pic-wrapper">
        <div class="profile-pic-gradient-ring">
          <div class="profile-pic-inner">
            <div class="profile-pic-placeholder">
              <svg viewBox="0 0 24 24" width="48" height="48" fill="#8e8e8e">
                <circle cx="12" cy="8" r="4"/>
                <path d="M20 21v-2a6 6 0 00-6-6H10a6 6 0 00-6 6v2"/>
              </svg>
            </div>
            <img class="profile-pic" src="" alt="Profile picture">
          </div>
        </div>
        <input type="file" id="profile-pic-input" accept="image/*" hidden>
      </div>

      <div class="profile-info">
        <div class="profile-top-row">
          <div class="profile-pic-mobile">
            <div class="profile-pic-gradient-ring profile-pic-gradient-ring-mobile">
              <div class="profile-pic-inner profile-pic-inner-mobile">
                <div class="profile-pic-placeholder profile-pic-placeholder-mobile">
                  <svg viewBox="0 0 24 24" width="32" height="32" fill="#8e8e8e">
                    <circle cx="12" cy="8" r="4"/>
                    <path d="M20 21v-2a6 6 0 00-6-6H10a6 6 0 00-6 6v2"/>
                  </svg>
                </div>
                <img class="profile-pic profile-pic-mobile-img" src="" alt="Profile picture">
              </div>
            </div>
          </div>
          <h1 class="username" contenteditable="true">username</h1>
          <span class="username-more" title="More options">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
          </span>
        </div>

        <div class="profile-stats">
          <div class="stat"><span class="stat-count" id="posts-count">0</span> <span class="stat-label">posts</span></div>
          <div class="stat"><span class="stat-count" contenteditable="true">1,234</span> <span class="stat-label">followers</span></div>
          <div class="stat"><span class="stat-count" contenteditable="true">567</span> <span class="stat-label">following</span></div>
        </div>

        <div class="profile-bio">
          <div class="display-name" contenteditable="true">Display Name</div>
          <div class="category-label" contenteditable="true">Category</div>
          <div class="bio-text" contenteditable="true">Bio goes here
Add multiple lines</div>
          <a class="website-link" contenteditable="true">example.com</a>
          <div class="threads-handle" contenteditable="true">@threads_handle</div>
        </div>

        <div class="profile-actions">
          <button class="action-btn">Edit profile</button>
          <button class="action-btn">View archive</button>
        </div>
      </div>
    </header>

    <section class="highlights">
      <div class="highlight-item highlight-new">
        <div class="highlight-circle">
          <span class="highlight-plus">+</span>
        </div>
        <span class="highlight-label">New</span>
      </div>
    </section>

    <nav class="tab-bar">
      <button class="tab-btn active" data-tab="grid" aria-label="Posts">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
          <rect x="1" y="1" width="10" height="10" rx="1" />
          <rect x="13" y="1" width="10" height="10" rx="1" />
          <rect x="1" y="13" width="10" height="10" rx="1" />
          <rect x="13" y="13" width="10" height="10" rx="1" />
        </svg>
      </button>
      <button class="tab-btn" data-tab="reels" aria-label="Reels">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="2" width="20" height="20" rx="2" />
          <line x1="2" y1="8" x2="22" y2="8" />
          <line x1="8" y1="2" x2="12" y2="8" />
          <line x1="14" y1="2" x2="18" y2="8" />
          <polygon points="10,12 10,20 17,16" fill="currentColor" stroke="none" />
        </svg>
      </button>
      <button class="tab-btn" data-tab="tagged" aria-label="Tagged">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="2" width="20" height="20" rx="2" />
          <circle cx="12" cy="10" r="3" />
          <path d="M6 21v-1a6 6 0 0112 0v1" />
        </svg>
      </button>
    </nav>

    <div id="grid" class="grid"></div>

    <div class="grid-controls">
      <button class="control-btn" id="add-row">Add row</button>
      <button class="control-btn" id="remove-row">Remove row</button>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
